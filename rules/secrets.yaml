- id: QS-SEC-001
  title: "Firebase API Key"
  pattern: "AIza[0-9A-Za-z_-]{35}"
  severity: warning
  category: secrets
  remediation: "Restrict API key in Firebase Console to specific APIs and app identifiers"

- id: QS-SEC-002
  title: "AWS Access Key ID"
  pattern: "AKIA[0-9A-Z]{16}"
  severity: high
  category: secrets
  cwe: "CWE-798"
  owasp_mobile: "M9"
  remediation: "Remove hardcoded AWS credentials; use IAM roles or environment variables"

- id: QS-SEC-003
  title: "AWS Secret Access Key"
  pattern: "(?i)aws.{0,20}['\"][0-9a-zA-Z/+]{40}['\"]"
  severity: high
  category: secrets
  cwe: "CWE-798"
  owasp_mobile: "M9"
  remediation: "Remove hardcoded AWS credentials; use IAM roles or environment variables"

- id: QS-SEC-004
  title: "Private Key Material"
  pattern: "-----BEGIN (?:RSA |EC |DSA )?PRIVATE KEY-----"
  severity: high
  category: secrets
  cwe: "CWE-321"
  owasp_mobile: "M9"
  remediation: "Never embed private keys in app binaries; use secure key management"

- id: QS-SEC-005
  title: "Generic API Key or Token"
  pattern: "(?i)(?:api[_-]?key|api[_-]?secret|access[_-]?token|auth[_-]?token)\\s*[:=]\\s*['\"][a-zA-Z0-9_\\-]{20,}['\"]"
  severity: warning
  category: secrets
  cwe: "CWE-798"
  owasp_mobile: "M9"
  remediation: "Store sensitive tokens in the Keychain, not in code or configuration files"

- id: QS-SEC-006
  title: "Hardcoded Password"
  pattern: "(?i)(?:password|passwd|pwd)\\s*[:=]\\s*['\"][^'\"]{8,}['\"]"
  severity: high
  category: secrets
  cwe: "CWE-259"
  owasp_mobile: "M9"
  remediation: "Never hardcode passwords; use secure credential storage"

- id: QS-SEC-007
  title: "Google OAuth Client ID"
  pattern: "[0-9]+-[a-z0-9_]{32}\\.apps\\.googleusercontent\\.com"
  severity: warning
  category: secrets
  remediation: "Restrict OAuth client ID to specific app bundle identifiers in Google Cloud Console"

- id: QS-SEC-008
  title: "Stripe API Key"
  pattern: "(?:sk|pk)_(?:live|test)_[0-9a-zA-Z]{24,}"
  severity: high
  category: secrets
  cwe: "CWE-798"
  remediation: "Use only publishable keys in mobile apps; never embed secret keys"

- id: QS-SEC-009
  title: "SendGrid API Key"
  pattern: "SG\\.[a-zA-Z0-9_-]{22}\\.[a-zA-Z0-9_-]{43}"
  severity: high
  category: secrets
  cwe: "CWE-798"
  remediation: "Remove SendGrid API keys from mobile apps"

- id: QS-SEC-010
  title: "GitHub Personal Access Token"
  pattern: "ghp_[a-zA-Z0-9]{36}"
  severity: high
  category: secrets
  cwe: "CWE-798"
  remediation: "Remove GitHub tokens from mobile apps"

- id: QS-SEC-011
  title: "Slack Webhook URL"
  pattern: "https://hooks\\.slack\\.com/services/T[A-Z0-9]+/B[A-Z0-9]+/[a-zA-Z0-9]+"
  severity: warning
  category: secrets
  remediation: "Rotate the Slack webhook URL and remove from app"

- id: QS-SEC-012
  title: "Twilio API Key"
  pattern: "SK[0-9a-fA-F]{32}"
  severity: high
  category: secrets
  cwe: "CWE-798"
  remediation: "Remove Twilio API keys from mobile apps"

- id: QS-SEC-013
  title: "Mailchimp API Key"
  pattern: "[0-9a-f]{32}-us[0-9]{1,2}"
  severity: warning
  category: secrets
  remediation: "Remove Mailchimp API keys from mobile apps"

- id: QS-SEC-014
  title: "Bearer Token in String"
  pattern: "(?i)Bearer\\s+[a-zA-Z0-9_\\-\\.]{20,}"
  severity: warning
  category: secrets
  cwe: "CWE-798"
  remediation: "Do not hardcode bearer tokens; fetch them at runtime from secure storage"

- id: QS-SEC-015
  title: "Mapbox Access Token"
  pattern: "pk\\.eyJ1IjoiW[a-zA-Z0-9_-]{40,}"
  severity: warning
  category: secrets
  cwe: "CWE-798"
  remediation: "Restrict Mapbox token to specific URL patterns and bundle IDs in the Mapbox dashboard"

- id: QS-SEC-016
  title: "Algolia API Key"
  pattern: "(?i)algolia.{0,30}['\"][a-f0-9]{32}['\"]"
  severity: warning
  category: secrets
  cwe: "CWE-798"
  remediation: "Use search-only API keys in mobile apps; never embed Admin API keys"

- id: QS-SEC-017
  title: "Twilio Auth Token"
  pattern: "(?i)twilio.{0,20}['\"][0-9a-f]{32}['\"]"
  severity: high
  category: secrets
  cwe: "CWE-798"
  owasp_mobile: "M9"
  remediation: "Remove Twilio Auth Token from mobile apps; use server-side proxying"

- id: QS-SEC-018
  title: "Mailgun API Key"
  pattern: "key-[0-9a-zA-Z]{32}"
  severity: high
  category: secrets
  cwe: "CWE-798"
  remediation: "Remove Mailgun API keys from mobile apps; call email APIs from your backend"

- id: QS-SEC-019
  title: "Intercom Secret Key"
  pattern: "(?i)intercom.{0,20}['\"][a-zA-Z0-9_-]{30,}['\"]"
  severity: warning
  category: secrets
  cwe: "CWE-798"
  remediation: "Use only the Intercom App ID in mobile apps; keep the secret key server-side"

- id: QS-SEC-020
  title: "HockeyApp / Crashlytics App Token"
  pattern: "(?i)(?:hockeyapp|fabric|crashlytics).{0,20}['\"][a-f0-9]{32}['\"]"
  severity: warning
  category: secrets
  cwe: "CWE-798"
  remediation: "Rotate the token; these tokens can allow unauthorized crash report access"

- id: QS-SEC-021
  title: "Hugging Face API Token"
  pattern: "hf_[a-zA-Z0-9]{34,}"
  severity: high
  category: secrets
  cwe: "CWE-798"
  remediation: "Remove Hugging Face tokens from mobile apps; proxy model calls through your backend"

- id: QS-SEC-022
  title: "Anthropic API Key"
  pattern: "sk-ant-[a-zA-Z0-9_-]{80,}"
  severity: high
  category: secrets
  cwe: "CWE-798"
  remediation: "Remove Anthropic API keys from mobile apps; never expose LLM API keys client-side"

- id: QS-SEC-023
  title: "OpenAI API Key"
  pattern: "sk-[a-zA-Z0-9]{48}"
  severity: high
  category: secrets
  cwe: "CWE-798"
  owasp_mobile: "M9"
  remediation: "Remove OpenAI API keys from mobile apps; proxy LLM calls through your backend"

- id: QS-SEC-024
  title: "Supabase Service Role Key"
  pattern: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9\\.[a-zA-Z0-9_-]{50,}\\.[a-zA-Z0-9_-]{20,}"
  severity: high
  category: secrets
  cwe: "CWE-798"
  owasp_mobile: "M9"
  remediation: "Never embed Supabase service_role keys in mobile apps; use the anon key and RLS policies instead"

- id: QS-SEC-025
  title: "GCP API Key"
  pattern: "AIza[0-9A-Za-z\\-_]{35}"
  severity: warning
  category: secrets
  remediation: "Restrict API key in GCP Console to specific APIs, platforms, and app identifiers"

- id: QS-SEC-026
  title: "Azure Storage Account Key"
  pattern: "(?i)(?:AccountKey|azure.{0,20}key)\\s*[:=]\\s*['\"][a-zA-Z0-9+/]{86}==['\"]"
  severity: high
  category: secrets
  cwe: "CWE-798"
  owasp_mobile: "M9"
  remediation: "Remove Azure storage keys from mobile apps; use SAS tokens with minimal permissions"

- id: QS-SEC-027
  title: "Hardcoded Database Connection String"
  pattern: "(?i)(?:mongodb|postgres|postgresql|mysql|mariadb|redis|amqps?|mssql)://[^\\s'\"<>]{8,}"
  severity: high
  category: secrets
  cwe: "CWE-798"
  owasp_mobile: "M9"
  owasp_masvs: "MSTG-STORAGE-14"
  remediation: "Remove hardcoded database connection strings from the app bundle. Backend database credentials must never be shipped in a client binary; proxy all database access through a server-side API"

- id: QS-SEC-028
  title: "SSL/TLS Validation Bypass in Challenge Handler"
  pattern: "completionHandler\\s*\\(\\s*\\.useCredential\\s*,\\s*URLCredential\\s*\\("
  severity: high
  category: network
  cwe: "CWE-295"
  owasp_mobile: "M3"
  owasp_masvs: "MSTG-NETWORK-3"
  remediation: "Do not accept arbitrary server credentials in URLSession challenge handlers. Validate the server trust against expected anchors or use TrustKit for certificate pinning"
