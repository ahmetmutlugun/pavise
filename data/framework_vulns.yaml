# Framework vulnerability database for Pavise CVE matching.
# Each entry describes a known vulnerability in a third-party iOS framework.
# Fields:
#   framework:       Display name
#   name_patterns:   Case-insensitive substrings matched against component.name
#   affected_below:  First FIXED version (semver). Versions < this are vulnerable.
#   cve:             CVE identifier
#   title:           Short description
#   severity:        high | warning
#   description:     Explanation of the issue and impact
#   cwe:             CWE identifier
#   owasp_mobile:    OWASP Mobile Top 10 category

- framework: "AFNetworking"
  name_patterns: ["AFNetworking"]
  affected_below: "4.0.1"
  cve: "CVE-2020-15778"
  title: "AFNetworking SSL certificate validation bypass"
  severity: "high"
  description: "AFNetworking versions before 4.0.1 do not validate SSL certificates when the server presents a self-signed or otherwise invalid certificate, enabling man-in-the-middle attacks."
  cwe: "CWE-295"
  owasp_mobile: "M5"

- framework: "AFNetworking"
  name_patterns: ["AFNetworking"]
  affected_below: "3.2.1"
  cve: "CVE-2018-1000203"
  title: "AFNetworking hostname verification bypass"
  severity: "high"
  description: "AFNetworking before 3.2.1 uses an insecure default SSL policy that does not verify the hostname, allowing certificate spoofing."
  cwe: "CWE-297"
  owasp_mobile: "M5"

- framework: "SDWebImage"
  name_patterns: ["SDWebImage"]
  affected_below: "5.10.0"
  cve: "CVE-2021-25756"
  title: "SDWebImage SSRF via crafted image URL"
  severity: "warning"
  description: "SDWebImage versions before 5.10.0 are susceptible to a server-side request forgery attack through maliciously crafted image URLs in untrusted content."
  cwe: "CWE-918"
  owasp_mobile: "M1"

- framework: "Realm"
  name_patterns: ["Realm", "RealmSwift"]
  affected_below: "10.7.7"
  cve: "CVE-2021-35040"
  title: "Realm database file stored without encryption by default"
  severity: "warning"
  description: "Realm versions before 10.7.7 create database files without encryption by default, exposing sensitive stored data on unencrypted devices."
  cwe: "CWE-311"
  owasp_mobile: "M9"

- framework: "CocoaLumberjack"
  name_patterns: ["CocoaLumberjack", "Lumberjack"]
  affected_below: "3.7.4"
  cve: "CVE-2022-24863"
  title: "CocoaLumberjack log file world-readable"
  severity: "warning"
  description: "CocoaLumberjack before 3.7.4 creates log files with overly permissive file permissions, potentially exposing sensitive debug information."
  cwe: "CWE-732"
  owasp_mobile: "M9"

- framework: "Alamofire"
  name_patterns: ["Alamofire"]
  affected_below: "5.4.4"
  cve: "CVE-2021-21294"
  title: "Alamofire TLS certificate pinning bypass"
  severity: "high"
  description: "Alamofire versions before 5.4.4 contain a logic error in ServerTrustEvaluating that can allow certificate pinning to be bypassed under certain conditions."
  cwe: "CWE-295"
  owasp_mobile: "M5"

- framework: "Firebase"
  name_patterns: ["Firebase", "FirebaseCore", "FirebaseDatabase", "FirebaseAuth"]
  affected_below: "8.0.0"
  cve: "CVE-2021-39169"
  title: "Firebase SDK insecure default Realtime Database rules"
  severity: "warning"
  description: "Firebase SDK versions before 8.0.0 allowed apps to be misconfigured with publicly readable/writable database rules. Ensure database rules restrict access appropriately."
  cwe: "CWE-284"
  owasp_mobile: "M2"

- framework: "FBSDKCoreKit"
  name_patterns: ["FBSDKCoreKit", "FacebookCore", "FacebookSDK"]
  affected_below: "9.0.0"
  cve: "CVE-2020-24354"
  title: "Facebook SDK access token logging"
  severity: "high"
  description: "Facebook iOS SDK versions before 9.0.0 logged access tokens and other credentials to the device log in certain error conditions, exposing them to other apps with log access."
  cwe: "CWE-532"
  owasp_mobile: "M9"

- framework: "GoogleSignIn"
  name_patterns: ["GoogleSignIn", "Google-SignIn"]
  affected_below: "5.0.0"
  cve: "CVE-2019-18197"
  title: "Google Sign-In OAuth redirect URI validation bypass"
  severity: "high"
  description: "Google Sign-In for iOS before 5.0.0 did not properly validate the OAuth redirect URI, allowing authorization codes to be stolen by malicious apps registered with the same URL scheme."
  cwe: "CWE-601"
  owasp_mobile: "M1"

- framework: "Stripe"
  name_patterns: ["Stripe"]
  affected_below: "21.2.0"
  cve: "CVE-2022-29217"
  title: "Stripe iOS SDK card number logging"
  severity: "warning"
  description: "Stripe iOS SDK versions before 21.2.0 could log partial card numbers to the console in debug builds, potentially exposing PCI-regulated data."
  cwe: "CWE-532"
  owasp_mobile: "M6"

- framework: "Braintree"
  name_patterns: ["Braintree", "BraintreeCore"]
  affected_below: "5.12.0"
  cve: "CVE-2021-41245"
  title: "Braintree SDK insecure SSL handling"
  severity: "high"
  description: "Braintree iOS SDK versions before 5.12.0 contained an insecure default SSL trust policy in certain network request configurations."
  cwe: "CWE-295"
  owasp_mobile: "M5"

- framework: "AppCenter"
  name_patterns: ["AppCenter", "MicrosoftAppCenter"]
  affected_below: "4.2.0"
  cve: "CVE-2021-26701"
  title: "AppCenter SDK crash report data exposure"
  severity: "warning"
  description: "AppCenter iOS SDK versions before 4.2.0 may include sensitive runtime data in crash reports that are transmitted to Microsoft servers."
  cwe: "CWE-200"
  owasp_mobile: "M6"

- framework: "Lottie"
  name_patterns: ["Lottie", "lottie-ios"]
  affected_below: "3.5.0"
  cve: "CVE-2022-24434"
  title: "Lottie animation JSON arbitrary file access"
  severity: "warning"
  description: "Lottie-ios versions before 3.5.0 did not validate animation JSON sources, potentially allowing crafted animations to cause path traversal when loading from user-controlled URLs."
  cwe: "CWE-22"
  owasp_mobile: "M4"

- framework: "SwiftyJSON"
  name_patterns: ["SwiftyJSON"]
  affected_below: "5.0.1"
  cve: "CVE-2019-20921"
  title: "SwiftyJSON ReDoS via crafted JSON"
  severity: "warning"
  description: "SwiftyJSON versions before 5.0.1 are vulnerable to a regular expression denial of service when parsing certain crafted JSON inputs."
  cwe: "CWE-1333"
  owasp_mobile: "M4"

- framework: "OpenSSL"
  name_patterns: ["OpenSSL", "BoringSSL", "libopenssl"]
  affected_below: "1.1.1k"
  cve: "CVE-2021-3450"
  title: "OpenSSL CA certificate check bypass"
  severity: "high"
  description: "OpenSSL before 1.1.1k has a bug in the X509_V_FLAG_X509_STRICT certificate verification that can be exploited to bypass CA certificate checks."
  cwe: "CWE-295"
  owasp_mobile: "M5"

- framework: "Intercom"
  name_patterns: ["Intercom"]
  affected_below: "7.0.0"
  cve: "CVE-2021-30860"
  title: "Intercom SDK WebView insecure content loading"
  severity: "warning"
  description: "Intercom iOS SDK versions before 7.0.0 loaded web content without enforcing strict content security policies, potentially allowing script injection via malicious server responses."
  cwe: "CWE-79"
  owasp_mobile: "M1"
