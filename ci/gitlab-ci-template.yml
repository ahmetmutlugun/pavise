# Pavise GitLab CI Template
# Include in your .gitlab-ci.yml:
#   include:
#     - remote: 'https://raw.githubusercontent.com/ahmetmutlugun/pavise/main/ci/gitlab-ci-template.yml'
#
# Override variables as needed:
#   variables:
#     PAVISE_MIN_SEVERITY: "medium"
#     PAVISE_FORMAT: "json"

variables:
  PAVISE_MIN_SEVERITY: "info"
  PAVISE_FORMAT: "sarif"
  PAVISE_IPA_PATH: ""

pavise-scan:
  image: ghcr.io/ahmetmutlugun/pavise:latest
  stage: test
  script:
    - >
      pavise "${PAVISE_IPA_PATH}"
      --format "${PAVISE_FORMAT}"
      --min-severity "${PAVISE_MIN_SEVERITY}"
      --output "pavise-report.${PAVISE_FORMAT}"
  artifacts:
    paths:
      - "pavise-report.*"
    reports:
      sast: pavise-report.sarif
    when: always
  rules:
    - if: $PAVISE_IPA_PATH != ""
